<section class="skills-section" id="skills">
  <div class="skills-container">
    <div class="skills-header">
      <h2 class="skills-title">
        Skills <span class="skills-title-accent">& Expertise</span>
      </h2>
    </div>

    <div class="skills-grid">
      <div class="skill-card">
        <div class="skill-card-header">
          <span class="skill-icon skill-icon-lang">Aa</span>
          <h3 class="skill-card-title">Languages</h3>
        </div>
        <div class="skill-card-body">
          <div *ngFor="let lang of skills.languages" class="skill-row">
            <span class="skill-label">{{ lang.name }}</span>
            <div class="skill-progress-wrap">
              <div class="skill-progress-bg">
                <div class="skill-progress-fill" [style.width.%]="lang.level"></div>
              </div>
              <span class="skill-percent">{{ lang.level }}%</span>
            </div>
          </div>
        </div>
      </div>

      <div class="skill-card">
        <div class="skill-card-header">
          <span class="skill-icon skill-icon-tech">&lt;/&gt;</span>
          <h3 class="skill-card-title">Technical</h3>
        </div>
        <div class="skill-card-body">
          <div *ngFor="let tech of skills.technical" class="skill-row">
            <span class="skill-label">{{ tech.name }}</span>
            <div class="skill-progress-wrap">
              <div class="skill-progress-bg">
                <div class="skill-progress-fill" [style.width.%]="tech.level"></div>
              </div>
              <span class="skill-percent">{{ tech.level }}%</span>
            </div>
          </div>
        </div>
      </div>

      <div class="skill-card">
        <div class="skill-card-header">
          <span class="skill-icon skill-icon-soft">👤</span>
          <h3 class="skill-card-title">Soft Skills</h3>
        </div>
        <div class="skill-card-body">
          <div class="skill-chips">
            <span *ngFor="let s of skills.soft" class="skill-chip">{{ s }}</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
