<section class="experience-section" id="experience">
  <div class="experience-container">
    <div class="experience-header">
      <h2 class="experience-title">
        Professional <span class="experience-title-accent">Journey</span>
      </h2>
      <p class="experience-subtitle">
        A continuous learning environment where I apply front-end knowledge and
        acquire new skills.
      </p>
    </div>

    <div class="timeline">
      <article *ngFor="let exp of experiences; let last = last" class="timeline-item">
        <div class="timeline-marker"></div>
        <div class="timeline-content">
          <p class="timeline-period">{{ exp.period }}</p>
          <h3 class="timeline-role">{{ exp.title }}</h3>
          <p class="timeline-company">{{ exp.company }}</p>
          <ul class="timeline-achievements">
            <li *ngFor="let achievement of exp.achievements" class="timeline-achievement">{{ achievement }}</li>
          </ul>
        </div>
        <div *ngIf="!last" class="timeline-line"></div>
      </article>
    </div>
  </div>
</section>
