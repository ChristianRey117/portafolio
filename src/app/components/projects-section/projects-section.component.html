<section class="projects-section" id="projects">
  <div class="projects-container">
    <div class="projects-header">
      <h2 class="projects-title">
        Featured <span class="projects-title-accent">Projects</span>
      </h2>
      <p class="projects-subtitle">
        A showcase of my recent work and personal projects that demonstrate my
        skills and passion for development.
      </p>
    </div>

    <div class="projects-grid">
      <article
        *ngFor="let project of featuredProjects"
        class="project-card"
      >
        <div class="project-card-image-wrap">
          <img
            [src]="project.image || '/assets/placeholder.svg'"
            [alt]="project.title"
            class="project-card-image"
          />
        </div>
        <div class="project-card-content">
          <h3 class="project-card-title">{{ project.title }}</h3>
          <p class="project-card-description">{{ project.description }}</p>
          <div class="project-card-tags">
            <span *ngFor="let tech of project.technologies" class="project-tag">{{ tech }}</span>
          </div>
          <div class="project-card-actions">
            <a
              *ngIf="project.github"
              [href]="project.github"
              target="_blank"
              rel="noopener noreferrer"
              class="project-link"
            >
              Code
            </a>
            <a
              *ngIf="project.demo"
              [href]="project.demo"
              target="_blank"
              rel="noopener noreferrer"
              class="project-link project-link-primary"
            >
              Demo
            </a>
          </div>
        </div>
      </article>
    </div>
  </div>
</section>
