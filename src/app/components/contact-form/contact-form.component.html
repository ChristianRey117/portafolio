<section class="contact-section" id="contact">
  <div class="contact-container">
    <div class="contact-card-wrap">
      <div class="contact-grid">
        <div class="contact-info">
          <h2 class="contact-title">
            Let's <span class="contact-title-accent">Connect</span>
          </h2>
          <p class="contact-description">
            I'm always open to discussing new projects and opportunities.
            Whether you have a question or just want to say hi, feel free to
            reach out.
          </p>
          <div class="contact-details">
            <div class="contact-detail-item">
              <svg
                class="contact-detail-icon"
                xmlns="http://www.w3.org/2000/svg"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <rect width="20" height="16" x="2" y="4" rx="2" />
                <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
              </svg>
              <a
                href="mailto:christianreyeshdz117&#64;gmail.com"
                class="contact-detail-link"
                >christianreyeshdz117&#64;gmail.com</a
              >
            </div>
            <div class="contact-detail-item">
              <svg
                class="contact-detail-icon"
                xmlns="http://www.w3.org/2000/svg"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z" />
                <circle cx="12" cy="10" r="3" />
              </svg>
              <span class="contact-detail-text">Mexico</span>
            </div>
          </div>
        </div>
        <div class="contact-form-wrap">
          <form
            class="contact-form"
            action="https://formspree.io/f/mreanbzr"
            method="POST"
            (ngSubmit)="onSubmit($event)"
          >
            <div class="contact-field">
              <input
                type="text"
                pInputText
                id="contact-name"
                placeholder="Your Name"
                class="contact-input"
                [(ngModel)]="name"
                name="name"
              />
            </div>
            <div class="contact-field">
              <input
                type="email"
                pInputText
                id="contact-email"
                placeholder="Your Email"
                class="contact-input"
                [(ngModel)]="email"
                name="email"
              />
            </div>
            <div class="contact-field">
              <textarea
                id="contact-message"
                placeholder="Your Message"
                rows="4"
                class="contact-input contact-textarea"
                [(ngModel)]="message"
                name="message"
              ></textarea>
            </div>
            <p-button
              type="submit"
              label="Send Message"
              icon="pi pi-arrow-right"
              iconPos="right"
              styleClass="contact-submit"
              [loading]="isLoading"
            ></p-button>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
